<!-- forgot-password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Roar & Rhythm</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth-pages.css">
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-logo" src="assets/logo.png" alt="Roar & Rhythm Logo">
      <span class="brand-name">Roar & Rhythm</span>
    </a>

    <form class="topbar-search" role="search" action="#" onsubmit="return false;">
      <span class="search-icon">🔎</span>
      <input class="search-input" type="search" placeholder="Search for poetry, music, art..." aria-label="Search">
    </form>

    <nav class="topbar-nav">
      <a href="poetry.html">Poetry</a>
      <a href="music.html">Music</a>
      <a href="art.html">Art</a>
      <a href="submit.html">Submit</a>
    </nav>

    <div class="topbar-auth">
      <a id="navLogin" class="pill pill-ghost" href="login.html">Login</a>
      <a id="navSignup" class="pill pill-solid" href="signup.html">Sign Up</a>

      <a id="navProfile" class="pill pill-ghost" href="profile.html" style="display:none;">Profile</a>
      <a id="navLogout" class="pill pill-ghost" href="logout.html" style="display:none;">Logout</a>
    </div>
  </header>

  <main>
    <section class="auth-wrap">
      <div class="auth-card">
        <h2 class="auth-title">Reset your password</h2>
        <p class="auth-subtitle">Enter your email and we will send you a reset link.</p>

        <form id="forgotPasswordForm">
          <label for="email">Email</label>
          <input id="email" type="email" required autocomplete="email">

          <button type="submit" id="forgotPasswordBtn">Send Reset Link</button>
          <p id="msg" class="msg"></p>
        </form>

        <p class="auth-link">
          Remembered it?
          <a id="backToLogin" href="login.html">Back to login</a>
        </p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 Roar & Rhythm | Morgan State University</p>
  </footer>

  <script type="module" src="auth.js"></script>
  <script type="module" src="forgot-password.js"></script>
</body>
</html>
